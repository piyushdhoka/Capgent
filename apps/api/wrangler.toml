name = "capagent-api"
main = "src/index.ts"
compatibility_date = "2026-03-06"

[vars]
CAPAGENT_CHALLENGE_TTL_SECONDS = "45"
CAPAGENT_PROOF_TTL_SECONDS = "600"
CAPAGENT_IDENTITY_TTL_SECONDS = "86400"


CAPAGENT_PUBLIC_BASE_URL = "https://YOUR-WORKER-URL"

CAPAGENT_CORS_ORIGINS = "http://localhost:3000,http://127.0.0.1:3000,https://capgent.vercel.app"

CAPAGENT_ALLOW_PUBLIC_REGISTRATION = "1"

CAPAGENT_RATE_LIMIT_CHALLENGE_PER_MINUTE = "120"
CAPAGENT_RATE_LIMIT_GUESTBOOK_SIGN_PER_MINUTE = "30"
CAPAGENT_RATE_LIMIT_BENCHMARK_REPORT_PER_MINUTE = "90"
CAPAGENT_GUESTBOOK_COOLDOWN_SECONDS = "20"
